<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Hire GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,Segoe UI;
background:#0f172a;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#020617;
}

nav h2{color:#22c55e}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:28px;
}

.hero span{color:#22c55e}

.hero p{
color:#aaa;
margin-top:10px;
}

/* CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:80px;
right:10px;
left:10px;
height:70vh;
background:#020617;
border-radius:15px;
display:none;
flex-direction:column;
}

/* HEADER */
.chat-header{
padding:12px;
background:#111827;
}

/* BODY */
.chat-body{
flex:1;
padding:10px;
overflow:auto;
}

/* MSG */
.msg{
padding:10px;
margin:5px;
border-radius:10px;
max-width:80%;
}

.user{
background:#22c55e;
margin-left:auto;
}

.bot{
background:#374151;
}

/* INPUT */
.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
}

.chat-input button{
background:#22c55e;
border:none;
padding:10px;
}

/* JOB CARD */
.job-card{
background:#111827;
margin:8px;
padding:10px;
border-radius:10px;
}

.job-card button{
margin-top:5px;
background:#22c55e;
border:none;
padding:5px 10px;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h2>DB Hire GPT</h2>
</nav>

<section class="hero">
<h1>AI Powered <span>Hiring Platform</span></h1>
<p>Talk with AI and get jobs instantly</p>
</section>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chat-header">DB Hire GPT</div>
<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Type here...">
<button onclick="send()">➤</button>
</div>
</div>

<script>

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
box.style.flexDirection="column";
}

// SEND MESSAGE
async function send(){
let text=msg.value.trim();
if(!text)return;

addMessage(text,"user");
msg.value="";

let typing=addMessage("Typing...","bot");

try{

let res=await fetch("https://db-backend-hiye.onrender.com/api/chat"{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId:"user1"
})
});

let data=await res.json();

typing.remove();

addMessage(data.reply,"bot");

// JOB SHOW
if(data.jobs && data.jobs.length>0){
data.jobs.forEach(job=>{
let div=document.createElement("div");
div.className="job-card";

div.innerHTML=`
<b>${job.title}</b><br>
${job.company}<br>
${job.location}<br>
<button onclick="apply('${job.link}')">Apply</button>
`;

chat.appendChild(div);
});
}

}catch{
typing.remove();
addMessage("Server slow hai ⏳","bot");
}
}

// ADD MESSAGE
function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return div;
}

// APPLY
function apply(link){
if(link){
window.open(link,"_blank");
}else{
alert("Link not available");
}
}

</script>

</body>
</html>
