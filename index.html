<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Hire GPT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* APP */
.chat-app{
  width:100%;
  max-width:420px;
  height:95vh;
  background:rgba(2,6,23,0.9);
  backdrop-filter:blur(12px);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.header h2{
  font-size:16px;
}

.status{
  font-size:12px;
  color:#22c55e;
}

/* CHAT */
.chat-container{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

/* BOT MESSAGE */
.bot-message{
  background:rgba(30,41,59,0.9);
  border:1px solid rgba(255,255,255,0.05);
  padding:12px 16px;
  border-radius:16px;
  color:#e2e8f0;
  max-width:75%;
  align-self:flex-start;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* USER MESSAGE */
.user-message{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  align-self:flex-end;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #1e293b;
}

.input-area input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  outline:none;
}

.input-area button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* WHATSAPP */
.whatsapp{
  position:absolute;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 16px;
  border-radius:50px;
  color:white;
  text-decoration:none;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* TYPING DOTS */
.dots::after {
  content: '';
  animation: dots 1.5s steps(3,end) infinite;
}

@keyframes dots {
  0% { content:''; }
  33% { content:'.'; }
  66% { content:'..'; }
  100% { content:'...'; }
}
</style>

</head>

<body>

<div class="chat-app">

  <div class="header">
    <h2>DB Hire GPT</h2>
    <div class="status">● Online Hiring Assistant</div>
  </div>

  <div class="chat-container" id="chat">

    <div class="bot-message">
      👋 Welcome to DB Solutions Hiring Desk.<br><br>
      Please share your job preference:<br>
      • Customer Support<br>
      • Work From Home<br>
      • Back Office
    </div>

  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<a href="https://wa.me/919302186887" target="_blank" class="whatsapp">
  WhatsApp
</a>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ENTER KEY
input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

function sendMessage(){
  if(input.value.trim() === "") return;

  const userText = input.value.toLowerCase();

  // USER MSG
  const userMsg = document.createElement("div");
  userMsg.className = "user-message";
  userMsg.innerText = input.value;
  chat.appendChild(userMsg);

  input.value = "";
  scrollDown();

  // TYPING
  const typing = document.createElement("div");
  typing.className = "bot-message";
  typing.innerHTML = "Typing<span class='dots'></span>";
  chat.appendChild(typing);
  scrollDown();

  setTimeout(()=>{
    typing.remove();

    const botMsg = document.createElement("div");
    botMsg.className = "bot-message";

    // PROFESSIONAL FLOW
    if(userText.includes("bhopal")){
      botMsg.innerText = "📍 We have openings in Bhopal for Customer Support roles.\n\nPlease confirm:\n• Experience (Fresher / Experienced)\n• Availability";
    }
    else if(userText.includes("fresher")){
      botMsg.innerText = "✅ Fresher positions available.\n\nSalary: ₹18,000 – ₹22,000 in-hand.\n\nPlease share your resume on WhatsApp for further process.";
    }
    else if(userText.includes("experience")){
      botMsg.innerText = "💼 Experienced candidates preferred.\n\nSalary up to ₹30,000 in-hand.\n\nKindly share your resume on WhatsApp.";
    }
    else if(userText.includes("resume") || userText.includes("bheja")){
      botMsg.innerText = "📩 Resume received.\n\nOur HR team will contact you within 24 hours.";
    }
    else if(userText.includes("kab")){
      botMsg.innerText = "⏳ You will receive a response within 12–24 working hours.\n\nPlease keep your phone active.";
    }
    else{
      botMsg.innerText = "📋 Please share:\n• Preferred job role\n• Location\n• Experience\n\nSo we can assist you better.";
    }

    chat.appendChild(botMsg);
    scrollDown();

  },1000);
}

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
