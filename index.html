<!DOCTYPE html>
<html>
<head>
<title>DB Solutions AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,Segoe UI;
background:#000;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
position:fixed;
width:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.logo span{
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

nav button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#22c55e,#4ade80);
cursor:pointer;
font-weight:bold;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* GLOW BACKGROUND */
.glow1{
position:absolute;
width:600px;
height:600px;
background:#22c55e;
filter:blur(200px);
opacity:0.25;
top:10%;
left:20%;
}

.glow2{
position:absolute;
width:500px;
height:500px;
background:#4ade80;
filter:blur(180px);
opacity:0.2;
bottom:10%;
right:20%;
}

/* HERO CONTENT */
.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:20px;
}

.hero h1{
font-size:70px;
font-weight:800;
line-height:1.2;
}

.hero span{
color:#22c55e;
text-shadow:0 0 25px #22c55e;
}

.hero p{
margin-top:20px;
color:#9ca3af;
font-size:18px;
line-height:1.6;
}

/* BUTTONS */
.hero-buttons{
margin-top:40px;
}

.hero-buttons button{
margin:10px;
padding:16px 32px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.hero-buttons button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #22c55e;
}

/* FEATURES */
.section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
width:260px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #22c55e;
}

/* CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:18px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px #22c55e;
}

/* WHATSAPP */
#whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:18px;
border-radius:50%;
cursor:pointer;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:90px;
right:20px;
width:340px;
height:480px;
background:#111827;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:15px;
background:#1f2937;
}

.chat-body{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
margin:8px;
padding:10px 14px;
border-radius:20px;
max-width:80%;
}

.user{
background:#22c55e;
margin-left:auto;
}

.bot{
background:#374151;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
}

.chat-input button{
background:#22c55e;
border:none;
padding:10px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:34px;}
.hero p{font-size:14px;}
.cards{flex-direction:column;}
#chatBox{width:90%;right:5%;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">DB Solutions <span>AI</span></div>

<div>
<button onclick="window.location.href='login.html'">Login</button>
<button onclick="window.location.href='signup.html'">Sign Up</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="glow1"></div>
<div class="glow2"></div>

<div class="hero-content">

<h1>
Next Gen <span>AI Hiring</span><br>
Powered by DB Hire GPT
</h1>

<p>
Experience intelligent hiring with automation.  
DB Solutions connects talent with opportunities faster and smarter.
</p>

<div class="hero-buttons">
<button onclick="toggleChat()">Start with AI</button>
<button onclick="window.location.href='signup.html'">Create Account</button>
</div>

</div>

</section>

<!-- FEATURES -->
<section class="section">
<h2>What We Do</h2>

<div class="cards">
<div class="card">AI Job Matching</div>
<div class="card">Smart Hiring</div>
<div class="card">Resume Guidance</div>
<div class="card">Automation</div>
</div>

</section>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chat-header">DB Hire GPT 🤖</div>
<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask about jobs...">
<button onclick="send()">➤</button>
</div>
</div>

<!-- WHATSAPP -->
<div id="whatsapp" onclick="window.open('https://wa.me/9171449936')">📞</div>

<script>

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

window.onload=()=>{
add("Hi 👋 I am DB Hire GPT. Ask me about jobs!", "bot");
};

async function send(){
let text=document.getElementById("msg").value;
if(!text)return;

add(text,"user");
document.getElementById("msg").value="";

let typing=document.createElement("div");
typing.innerText="Typing...";
typing.className="msg bot";
chat.appendChild(typing);

try{
let res=await fetch("https://db-backend-hiye.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:"Answer professionally in 3-5 lines. "+text
})
});

let data=await res.json();

chat.removeChild(typing);
add(data.reply,"bot");

}catch{
chat.removeChild(typing);
add("Server waking up ⏳","bot");
}
}

</script>

</body>
</html>
