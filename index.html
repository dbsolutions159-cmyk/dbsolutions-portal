<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

/* BACKGROUND */
body{
height:100vh;
display:grid;
grid-template-columns:260px 1fr;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(20px);
padding:20px;
transition:0.3s;
z-index:1001;
}

.sidebar.active{left:0}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
}
.menu div:hover{background:#1e293b}

/* BACK BUTTON */
.back-btn{
padding:10px;
margin-bottom:15px;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}
.back-btn:hover{background:#22c55e;color:black}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:1000;
}
#overlay.active{display:block}

/* MAIN */
.main{
display:flex;
flex-direction:column;
width:100%;
}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.online::before{
content:'';
width:8px;height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:0.4}
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
max-width:700px;
margin:auto;
}

/* MESSAGE */
.message{
display:flex;
gap:10px;
animation:fade 0.3s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.user{flex-direction:row-reverse}

.avatar{
width:30px;height:30px;
border-radius:50%;
background:#334155;
display:flex;
align-items:center;
justify-content:center;
}

.bubble{
padding:12px;
border-radius:14px;
background:#1e293b;
}
.user .bubble{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* INPUT */
.input{
display:flex;
gap:8px;
padding:10px;
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.05);
border-radius:16px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

button{
padding:10px 12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
}

/* typing */
.typing span{
display:inline-block;
width:6px;height:6px;
background:#aaa;
margin:2px;
border-radius:50%;
animation:blink 1.2s infinite;
}
@keyframes blink{
0%,100%{opacity:0}
50%{opacity:1}
}

/* MOBILE */
@media(max-width:768px){
body{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="back-btn" onclick="closeMenu()">⬅ Back</div>

<div class="menu">
<div>🏠 Home</div>
<div>👤 Profile</div>
<div>⚙️ Settings</div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div onclick="openMenu()">☰</div>
<div>DB Job GPT ✔</div>
<div class="online">Online</div>
</div>

<div class="chat" id="chat">
<div class="message">
<div class="avatar">🤖</div>
<div class="bubble">Hi 👋 kaunsi job chahiye?</div>
</div>
</div>

<div class="input">
<input id="msg" placeholder="Type..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
<button onclick="upload()">📎</button>
<input type="file" id="fileInput" hidden>
</div>

</div>

<script>

/* MENU */
function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}
function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* ENTER */
function enterSend(e){
if(e.key==="Enter") send();
}

/* CHAT */
function send(){

let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(!input.value) return;

let text=input.value;

// USER
chat.innerHTML+=`
<div class="message user">
<div class="avatar">👤</div>
<div class="bubble">${text}</div>
</div>
`;

// typing
chat.innerHTML+=`
<div class="message">
<div class="avatar">🤖</div>
<div class="bubble typing"><span></span><span></span><span></span></div>
</div>
`;

setTimeout(()=>{
chat.lastElementChild.remove();

chat.innerHTML+=`
<div class="message">
<div class="avatar">🤖</div>
<div class="bubble">Got it 👍 ${text} ke liye best jobs dikhata hoon...</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

},800);

input.value="";
}

/* VOICE */
function voice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported");
return;
}

let rec=new SpeechRecognition();
rec.lang="en-IN";
rec.start();

rec.onresult=function(e){
document.getElementById("msg").value=e.results[0][0].transcript;
};

}

/* UPLOAD */
function upload(){
document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change",function(){
let file=this.files[0];
if(file){
alert("Uploaded: "+file.name);
}
});

</script>

</body>
</html>
