<!DOCTYPE html>
<html>
<head>
<title>DB Solutions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#000;
color:white;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
position:fixed;
width:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:18px;
font-weight:500;
letter-spacing:1px;
}

nav button{
margin-left:10px;
padding:8px 16px;
border-radius:20px;
border:1px solid #333;
background:transparent;
color:white;
cursor:pointer;
}

nav button:hover{
background:white;
color:black;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content{
max-width:800px;
}

.hero h1{
font-size:72px;
font-weight:600;
letter-spacing:-2px;
}

.hero span{
color:#22c55e;
}

.hero p{
margin-top:20px;
font-size:18px;
color:#aaa;
line-height:1.6;
}

.hero-buttons{
margin-top:30px;
}

.hero-buttons button{
margin:10px;
padding:12px 28px;
border-radius:25px;
border:none;
font-size:16px;
cursor:pointer;
}

.primary{
background:white;
color:black;
}

.secondary{
background:transparent;
border:1px solid #333;
color:white;
}

.primary:hover{
opacity:0.9;
}

.secondary:hover{
background:white;
color:black;
}

/* CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:white;
color:black;
padding:14px;
border-radius:50%;
cursor:pointer;
z-index:999;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:80px;
right:20px;
width:320px;
height:420px;
background:#111;
border-radius:16px;
display:none;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:12px;
border-bottom:1px solid #222;
}

.chat-body{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
margin:6px;
padding:10px;
border-radius:12px;
max-width:80%;
font-size:14px;
}

.user{
background:white;
color:black;
margin-left:auto;
}

.bot{
background:#222;
}

.chat-input{
display:flex;
border-top:1px solid #222;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
background:#111;
color:white;
}

.chat-input button{
padding:10px;
background:white;
border:none;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:36px;}
.hero p{font-size:14px;}
#chatBox{width:90%;right:5%;}
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">DB Solutions</div>

<div>
<button onclick="window.location.href='login.html'">Login</button>
<button onclick="window.location.href='signup.html'">Sign Up</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-content">

<h1>
Hire Smarter <br>
with <span>AI</span>
</h1>

<p>
DB Solutions helps you find the right job faster using intelligent automation and real-time hiring technology.
</p>

<div class="hero-buttons">
<button class="primary" onclick="toggleChat()">Start with AI</button>
<button class="secondary" onclick="window.location.href='signup.html'">Create Account</button>
</div>

</div>

</section>

<!-- CHAT BUTTON -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chatBox">
<div class="chat-header">DB Hire GPT</div>
<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask about jobs...">
<button onclick="send()">➤</button>
</div>
</div>

<script>

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

window.onload=()=>{
add("Hi 👋 I am DB Hire GPT. Ask me anything about jobs.", "bot");
};

async function send(){
let text=document.getElementById("msg").value;
if(!text)return;

add(text,"user");
document.getElementById("msg").value="";

try{
let res=await fetch("https://db-backend-hiye.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:"Answer professionally in medium length. "+text
})
});

let data=await res.json();
add(data.reply,"bot");

}catch{
add("Server starting... try again ⏳","bot");
}
}

</script>

</body>
</html>
