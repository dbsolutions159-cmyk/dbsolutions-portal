<script>

/* BUTTONS */
function login(){
alert("Login working ✔");
}

function signup(){
alert("Signup working ✔");
}

function start(){
toggleChat();
}

/* CHAT */
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
box.style.flexDirection="column";
}

async function send(){
let text=document.getElementById("msg").value;
if(!text)return;

add(text,"user");
document.getElementById("msg").value="";

// typing
let typing=document.createElement("div");
typing.innerText="Typing...";
typing.className="msg bot";
document.getElementById("chat").appendChild(typing);

try{
let res=await fetch("https://db-backend-hiye.onrender.com/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

let data=await res.json();

document.getElementById("chat").removeChild(typing);
add(data.reply || "No response","bot");

}catch(err){
console.log(err);
document.getElementById("chat").removeChild(typing);
add("Server not connected","bot");
}
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
document.getElementById("chat").appendChild(div);
}

</script>
