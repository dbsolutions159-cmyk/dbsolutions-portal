<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

/* BODY */
body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
border-right:1px solid #1e293b;
padding:15px;
transition:0.3s;
z-index:100;
}

.sidebar.active{left:0}

.menu{
padding:12px;
border-radius:10px;
cursor:pointer;
color:#94a3b8;
margin-bottom:5px;
}

.menu:hover{
background:#1e293b;
color:white;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #1e293b;
}

.menu-btn{cursor:pointer}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* MESSAGE */
.msg{
display:flex;
gap:10px;
max-width:800px;
}

.msg.user{
align-self:flex-end;
flex-direction:row-reverse;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
}

.bubble{
padding:12px;
border-radius:16px;
background:#1e293b;
}

.user .bubble{
background:#2563eb;
}

/* INPUT */
.input-box{
padding:10px;
border-top:1px solid #1e293b;
}

.input-inner{
display:flex;
background:#1e293b;
border-radius:20px;
padding:6px;
}

input{
flex:1;
border:none;
background:none;
color:white;
padding:10px;
outline:none;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 15px;
border-radius:12px;
cursor:pointer;
}

/* LOGIN */
.login{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
flex-direction:column;
gap:10px;
}

.login input{
width:250px;
padding:10px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

.hidden{display:none}

/* MOBILE */
@media(max-width:768px){
.sidebar{width:220px}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
<h2>DB AI Login</h2>
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menu" onclick="navigate('home')">🏠 Home</div>
<div class="menu" onclick="navigate('profile')">👤 Profile</div>
<div class="menu" onclick="navigate('settings')">⚙ Settings</div>
<div class="menu" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main hidden" id="main">

<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div>DB AI</div>
<div id="userName"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
<div class="input-inner">
<input id="msg" placeholder="Ask anything..." onkeydown="enterSend(event)">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>

// LOGIN SYSTEM
function login(){
let name = username.value.trim();
if(!name) return alert("Enter name");

localStorage.setItem("user",name);
init();
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

function init(){
let user = localStorage.getItem("user");
if(user){
loginPage.classList.add("hidden");
main.classList.remove("hidden");
userName.innerText=user;
}
}
init();

// MENU
function toggleMenu(){
sidebar.classList.toggle("active");
}

// NAVIGATION
function navigate(page){
alert(page + " page coming soon 🚀");
}

// CHAT
function addUser(text){
chat.innerHTML += `
<div class="msg user">
<div class="avatar">U</div>
<div class="bubble">${text}</div>
</div>`;
}

function typeMsg(text){
let i=0;
let id="m"+Date.now();

chat.innerHTML += `
<div class="msg">
<div class="avatar">AI</div>
<div class="bubble" id="${id}"></div>
</div>`;

let el=document.getElementById(id);

let inter=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(inter);
},15);
}

// SEND
function send(){
let text=msg.value.trim();
if(!text) return;

addUser(text);
msg.value="";

typeMsg("Typing...");

fetch("https://db-backend-hiye.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})
.then(res=>res.json())
.then(data=>{
chat.lastChild.remove();
typeMsg(data.reply);
})
.catch(()=>{
chat.lastChild.remove();
typeMsg("Server error ❌");
});
}

function enterSend(e){
if(e.key==="Enter") send();
}

</script>

</body>
</html>
