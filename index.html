<!DOCTYPE html>
<html>
<head>
<title>DB Solutions AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,Segoe UI;
background:#020617;
color:white;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 30px;
position:fixed;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.logo span{
color:#22c55e;
}

nav button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#22c55e,#4ade80);
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero-bg{
position:absolute;
width:600px;
height:600px;
background:#22c55e;
filter:blur(150px);
opacity:0.2;
top:20%;
left:50%;
transform:translateX(-50%);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
padding:20px;
}

.hero h1{
font-size:60px;
font-weight:700;
}

.hero span{
color:#22c55e;
}

.hero p{
margin-top:20px;
color:#aaa;
font-size:18px;
line-height:1.6;
}

.hero-buttons{
margin-top:30px;
}

.hero-buttons button{
margin:10px;
padding:15px 30px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#22c55e,#4ade80);
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.hero-buttons button:hover{
transform:scale(1.05);
}

/* CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:16px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px #22c55e;
}

/* WHATSAPP */
#whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:16px;
border-radius:50%;
cursor:pointer;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:90px;
right:20px;
width:340px;
height:480px;
background:#111827;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:15px;
background:#1f2937;
}

.chat-body{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
margin:8px;
padding:10px 14px;
border-radius:20px;
max-width:80%;
}

.user{
background:#22c55e;
margin-left:auto;
}

.bot{
background:#374151;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
}

.chat-input button{
background:#22c55e;
border:none;
padding:10px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:32px;}
.hero p{font-size:14px;}
#chatBox{width:90%;right:5%;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">DB Solutions <span>AI</span></div>

<div>
<button onclick="window.location.href='login.html'">Login</button>
<button onclick="window.location.href='signup.html'">Sign Up</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-bg"></div>

<div class="hero-content">

<h1>
AI Powered <span>Hiring Platform</span>
</h1>

<p>
DB Solutions is redefining hiring using AI.  
Connect with the right opportunities faster using DB Hire GPT.
</p>

<div class="hero-buttons">
<button onclick="toggleChat()">Talk to AI</button>
<button onclick="window.location.href='signup.html'">Get Started</button>
</div>

</div>

</section>

<!-- CHAT BUTTON -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chatBox">
<div class="chat-header">DB Hire GPT 🤖</div>
<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask about jobs...">
<button onclick="send()">➤</button>
</div>
</div>

<!-- WHATSAPP -->
<div id="whatsapp" onclick="window.open('https://wa.me/9171449936')">📞</div>

<script>

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

window.onload=()=>{
add("Hi 👋 I am DB Hire GPT. Ask me about jobs!", "bot");
};

async function send(){
let text=document.getElementById("msg").value;
if(!text)return;

add(text,"user");
document.getElementById("msg").value="";

let typing=document.createElement("div");
typing.innerText="Typing...";
typing.className="msg bot";
chat.appendChild(typing);

try{
let res=await fetch("https://db-backend-hiye.onrender.com/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:"Answer in 3-5 lines professionally. "+text
})
});

let data=await res.json();

chat.removeChild(typing);
add(data.reply,"bot");

}catch{
chat.removeChild(typing);
add("Server waking up ⏳","bot");
}
}

</script>

</body>
</html>
