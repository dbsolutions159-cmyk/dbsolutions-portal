<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
display:flex;
height:100vh;
background:#0b1220;
color:#e2e8f0;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
transition:0.3s;
border-right:1px solid #1e293b;
}

.sidebar.active{left:0}

.logo{font-weight:600;margin-bottom:20px}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:6px;
}
.menu div:hover{background:#1e293b}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #1e293b;
align-items:center;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.bot,.user{
padding:14px;
border-radius:14px;
max-width:70%;
animation:fadeIn 0.3s ease;
}

.bot{background:#1e293b}
.user{
background:linear-gradient(135deg,#22c55e,#16a34a);
align-self:flex-end;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* INPUT */
.input{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #1e293b;
background:#020617;
}

input{
flex:1;
padding:14px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* PAGE */
.page{display:none}
.activePage{display:block}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:fixed;
left:-100%;
top:0;
height:100%;
z-index:1000;
}
.sidebar.active{left:0}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">DB Job GPT ✔</div>

<div class="menu">
<div onclick="goHome()">🏠 Home</div>
<div onclick="openPage('profile')">👤 Profile</div>
<div onclick="openPage('settings')">⚙️ Settings</div>
</div>

<div style="margin-top:auto;font-size:11px;color:#64748b;">
DB Solutions
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div onclick="toggleMenu()">☰</div>
<div>DB Job GPT ✔</div>
<div>● AI Online</div>
</div>

<!-- CHAT -->
<div id="chat" class="chat page activePage"></div>

<!-- PROFILE -->
<div id="profile" class="page">
<div onclick="goHome()">← Back</div><br>

<input placeholder="Full Name"><br><br>
<input placeholder="Phone"><br><br>
<input placeholder="Email"><br><br>
<input placeholder="Experience"><br><br>
<input placeholder="Skills"><br><br>
<button>Save</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<div onclick="goHome()">← Back</div><br>

<input placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
</div>

</div>

<!-- INPUT -->
<div class="input">
<input id="msg" placeholder="Type..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>

// NAV
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById(id).classList.add("activePage");
setTimeout(()=>closeSidebar(),200);
}

function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById("chat").classList.add("activePage");
}

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function closeSidebar(){
document.getElementById("sidebar").classList.remove("active");
}

// ENTER
function enterSend(e){
if(e.key==="Enter") send();
}

// CHAT LOAD
let chat=document.getElementById("chat");
chat.innerHTML = localStorage.getItem("chat") || 
`<div class="bot">👋 Welcome to DB Job GPT</div>`;

// SEND MESSAGE (REAL API)
async function send(){
let input=document.getElementById("msg");
if(!input.value) return;

let text=input.value;

// USER MSG
chat.insertAdjacentHTML("beforeend", `<div class="user">${text}</div>`);

// BOT LOADING
let bot = document.createElement("div");
bot.className="bot";
bot.innerText="Typing...";
chat.appendChild(bot);

input.value="";
chat.scrollTop=chat.scrollHeight;

try{
const res = await fetch("http://localhost:3000/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data = await res.json();
bot.innerText = data.reply || "No response";

}catch(err){
bot.innerText="Server error ❌";
}

// SAVE CHAT
localStorage.setItem("chat", chat.innerHTML);
chat.scrollTop=chat.scrollHeight;
}

// VOICE
function voice(){
try{
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.onresult=e=>{
document.getElementById("msg").value=e.results[0][0].transcript;
};
rec.onerror=()=>alert("Voice error");
rec.start();
}catch{
alert("Voice not supported");
}
}

</script>

</body>
</html>
