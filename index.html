<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB AI Hiring</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f172a;color:white;display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:#020617;padding:20px}
.logo{font-size:20px;font-weight:bold;margin-bottom:20px}

/* CHAT */
.chat-container{flex:1;display:flex;flex-direction:column}
.header{padding:15px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between}

/* AVATAR */
.avatar{
width:40px;height:40px;border-radius:50%;
background:#2563eb;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}

/* CHAT */
.chat-box{flex:1;overflow-y:auto;padding:20px}

.message{max-width:70%;padding:12px;margin-bottom:10px;border-radius:12px}
.user{background:#2563eb;margin-left:auto}
.bot{background:#1e293b}

/* JOB CARD */
.job-card{background:#1e293b;padding:10px;border-radius:10px;margin-top:8px}

/* INPUT */
.input-box{display:flex;padding:15px;border-top:1px solid #1e293b}
input{flex:1;padding:12px;border:none;border-radius:10px}
button{margin-left:10px;padding:12px;background:#2563eb;border:none;color:white;border-radius:10px}

/* TYPING */
.typing{opacity:0.7}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DB AI</div>
</div>

<div class="chat-container">

<div class="header">
  <div>AI Hiring Assistant</div>
  <select id="voiceSelect">
    <option value="male">Sriman ji</option>
    <option value="female">Shrimati ji</option>
  </select>
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask about jobs..." />
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

</div>

<script>
const API = "https://YOUR-BACKEND-URL/api/chat";

// 🔥 STREAMING TYPE EFFECT
function typeEffect(element, text, speed=20){
let i = 0;
function typing(){
if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
setTimeout(typing, speed);
}
}
typing();
}

// 🔥 SEND MESSAGE
async function send(){
const input = document.getElementById("input");
const chat = document.getElementById("chat");

const msg = input.value;
if(!msg) return;

chat.innerHTML += `<div class="message user">${msg}</div>`;
input.value = "";

// typing indicator
const botDiv = document.createElement("div");
botDiv.className = "message bot typing";
chat.appendChild(botDiv);

const res = await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({message: msg})
});

const data = await res.json();

// STREAMING TEXT
botDiv.innerHTML = "";
typeEffect(botDiv, data.reply);

// SPEAK
speak(data.reply);

chat.scrollTop = chat.scrollHeight;
}

// 🔊 TEXT TO SPEECH (MALE / FEMALE)
function speak(text){
const speech = new SpeechSynthesisUtterance(text);

const selected = document.getElementById("voiceSelect").value;

const voices = speechSynthesis.getVoices();

if(selected === "female"){
speech.voice = voices.find(v => v.name.toLowerCase().includes("female")) || voices[1];
}else{
speech.voice = voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
}

speech.lang = "en-IN";
speech.rate = 1;
speech.pitch = 1;

speechSynthesis.speak(speech);
}

// 🎤 VOICE INPUT
function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-IN";

recognition.onresult = function(event){
document.getElementById("input").value = event.results[0][0].transcript;
send();
}

recognition.start();
}
</script>

</body>
</html>
