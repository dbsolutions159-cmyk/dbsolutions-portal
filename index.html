<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

/* BACKGROUND */
body{
background: radial-gradient(circle at top, #0f172a, #020617);
color:#e2e8f0;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:16px 20px;
border-bottom:1px solid #1e293b;
}

.logo{font-weight:600}

/* CENTER HOME */
.home{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.title{
font-size:30px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

/* INPUT */
.input-box{
width:100%;
max-width:650px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:20px;
padding:12px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 0 40px rgba(34,197,94,0.1);
}

input{
flex:1;
background:none;
border:none;
color:white;
font-size:16px;
outline:none;
}

button{
background:#22c55e;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
cursor:pointer;
}

/* CHAT */
.chat{
flex:1;
display:none;
padding:20px;
max-width:800px;
margin:auto;
overflow-y:auto;
}

.message{
margin-bottom:15px;
display:flex;
}

.user{
justify-content:flex-end;
}

.bubble{
padding:12px 14px;
border-radius:14px;
max-width:70%;
background:#1e293b;
}

.user .bubble{
background:#22c55e;
}

/* BOTTOM INPUT */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#020617;
padding:10px;
display:none;
}

.bottom-box{
max-width:800px;
margin:auto;
display:flex;
gap:10px;
}

.bottom input{
background:#1e293b;
padding:10px;
border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
.title{font-size:22px}
}
</style>
</head>

<body>

<div class="header">
<div>DB Job GPT ✔</div>
<div>● Online</div>
</div>

<!-- HOME -->
<div class="home" id="home">

<div class="title">Hi 👋 Dharmesh</div>
<div class="subtitle">Where should we start?</div>

<div class="input-box">
<input id="msg" placeholder="Ask about jobs..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
</div>

</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- BOTTOM -->
<div class="bottom" id="bottom">
<div class="bottom-box">
<input id="msg2" placeholder="Type..." onkeydown="enterSend2(event)">
<button onclick="send2()">Send</button>
</div>
</div>

<script>

function enterSend(e){
if(e.key==="Enter") send();
}

function enterSend2(e){
if(e.key==="Enter") send2();
}

function send(){
let text=msg.value;
if(!text) return;

home.style.display="none";
chat.style.display="block";
bottom.style.display="block";

addMsg(text,true);
bot(text);

msg.value="";
}

function send2(){
let text=msg2.value;
if(!text) return;

addMsg(text,true);
bot(text);

msg2.value="";
}

function addMsg(text,user){
chat.innerHTML+=`
<div class="message ${user?'user':''}">
<div class="bubble">${text}</div>
</div>
`;
chat.scrollTop=chat.scrollHeight;
}

function bot(text){
setTimeout(()=>{
addMsg("Nice 👍 thoda aur detail do (role, location, experience)",false);
},500);
}

</script>

</body>
</html>
