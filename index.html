<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

/* BACKGROUND */
body{
background: radial-gradient(circle at top, #0f172a, #020617);
color:#e2e8f0;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:16px 20px;
border-bottom:1px solid #1e293b;
backdrop-filter: blur(10px);
}

.status{
color:#22c55e;
font-size:13px;
}

/* HOME */
.home{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:fadeIn 0.5s ease;
}

.title{
font-size:32px;
font-weight:600;
}

.subtitle{
color:#94a3b8;
margin:10px 0 30px;
}

/* INPUT BOX */
.input-box{
width:100%;
max-width:650px;
background:rgba(15,23,42,0.6);
border:1px solid #1e293b;
border-radius:20px;
padding:12px;
display:flex;
gap:10px;
backdrop-filter: blur(10px);
}

input{
flex:1;
background:none;
border:none;
color:white;
font-size:16px;
outline:none;
}

button{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:12px;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#16a34a;
}

/* CHAT */
.chat{
flex:1;
display:none;
padding:20px;
max-width:850px;
margin:auto;
overflow-y:auto;
scroll-behavior:smooth;
}

.message{
margin-bottom:18px;
display:flex;
animation:fadeIn 0.3s ease;
}

.user{
justify-content:flex-end;
}

.bubble{
padding:12px 16px;
border-radius:16px;
max-width:75%;
background:#1e293b;
line-height:1.5;
}

.user .bubble{
background:#22c55e;
}

/* TYPING */
.typing{
font-size:13px;
color:#94a3b8;
padding-left:5px;
}

/* BOTTOM INPUT */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#020617;
padding:10px;
display:none;
border-top:1px solid #1e293b;
}

.bottom-box{
max-width:850px;
margin:auto;
display:flex;
gap:10px;
}

.bottom input{
background:#1e293b;
padding:12px;
border-radius:10px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:768px){
.title{font-size:24px}
.bubble{max-width:85%}
}
</style>
</head>

<body>

<div class="header">
<div><b>DB Job GPT</b> ✔</div>
<div class="status">● Online</div>
</div>

<!-- HOME -->
<div class="home" id="home">

<div class="title">Hi 👋 Dharmesh</div>
<div class="subtitle">Ask me anything about jobs</div>

<div class="input-box">
<input id="msg" placeholder="Search jobs, roles, salary..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
</div>

</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- BOTTOM -->
<div class="bottom" id="bottom">
<div class="bottom-box">
<input id="msg2" placeholder="Type your message..." onkeydown="enterSend2(event)">
<button onclick="send2()">Send</button>
</div>
</div>

<script>

function enterSend(e){
if(e.key==="Enter") send();
}

function enterSend2(e){
if(e.key==="Enter") send2();
}

/* SEND FROM HOME */
function send(){
let text = msg.value.trim();
if(!text) return;

startChat();
addMsg(text,true);
bot(text);

msg.value="";
}

/* SEND FROM CHAT */
function send2(){
let text = msg2.value.trim();
if(!text) return;

addMsg(text,true);
bot(text);

msg2.value="";
}

/* START CHAT UI */
function startChat(){
home.style.display="none";
chat.style.display="block";
bottom.style.display="block";
}

/* ADD MESSAGE */
function addMsg(text,user){
chat.innerHTML += `
<div class="message ${user?'user':''}">
<div class="bubble">${text}</div>
</div>`;
chat.scrollTop = chat.scrollHeight;
}

/* BOT RESPONSE */
function bot(text){

// typing indicator
let typingId = "typing-"+Date.now();
chat.innerHTML += `
<div class="message" id="${typingId}">
<div class="bubble typing">Typing...</div>
</div>`;

chat.scrollTop = chat.scrollHeight;

setTimeout(()=>{

document.getElementById(typingId).remove();

let reply = generateReply(text);

addMsg(reply,false);

},1000);
}

/* SMART REPLY SYSTEM */
function generateReply(text){

text = text.toLowerCase();

if(text.includes("job")){
return "Tell me role, location & experience. I’ll find best jobs for you 🚀";
}

if(text.includes("salary")){
return "Salary depends on role & experience. Tell me details 👍";
}

if(text.includes("remote")){
return "Remote jobs available 💻 — share your skills";
}

return "Got it 👍 Give more details (role, location, experience)";
}

</script>

</body>
</html>
