<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
display:flex;
height:100vh;
background:#0b1220;
color:#e2e8f0;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
transition:0.3s;
border-right:1px solid #1e293b;
}

.sidebar.collapsed{
width:70px;
}

.logo{
font-weight:600;
margin-bottom:20px;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:6px;
}

.menu div:hover{background:#1e293b}

.active{background:#22c55e;color:black}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #1e293b;
align-items:center;
}

.menu-btn{
cursor:pointer;
font-size:18px;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.bot{
background:#1e293b;
padding:14px;
border-radius:14px;
max-width:60%;
}

.user{
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:14px;
border-radius:14px;
align-self:flex-end;
max-width:60%;
}

/* INPUT */
.input{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #1e293b;
background:#020617;
}

input{
flex:1;
padding:14px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* PAGES */
.page{display:none}
.activePage{display:block}

/* SETTINGS */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

/* BACK BUTTON */
.back{
margin-bottom:15px;
cursor:pointer;
color:#22c55e;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:fixed;
left:-100%;
top:0;
height:100%;
z-index:1000;
}
.sidebar.active{left:0}
}

/* TABLET */
@media(max-width:1024px){
.sidebar{width:200px}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">DB Job GPT ✔</div>

<div class="menu">
<div onclick="goHome()">🏠 Home</div>
<div onclick="openPage('profile')">👤 Profile</div>
<div onclick="openPage('settings')">⚙️ Settings</div>
<div onclick="openPage('subscription')">💳 Subscription</div>
</div>

<div style="margin-top:auto;font-size:11px;color:#64748b;">
DB Job GPT by DB Solutions
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div>DB Job GPT ✔</div>
<div>● AI Online</div>
</div>

<!-- CHAT -->
<div id="chat" class="chat page activePage">
<div class="bot">👋 Welcome, how can I help you?</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="back" onclick="goHome()">← Back</div>

<div class="card">
<h3>Profile</h3><br>
<input placeholder="Full Name"><br><br>
<input placeholder="Phone"><br><br>
<input placeholder="Email"><br><br>
<input placeholder="Experience"><br><br>
<input placeholder="Skills"><br><br>
<button>Save</button>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<div class="back" onclick="goHome()">← Back</div>

<div class="card">
<h3>Account</h3><br>
<input placeholder="Username"><br><br>
<input placeholder="Password"><br><br>
</div>

<div class="card">
<h3>Preferences</h3><br>
Dark Mode <button onclick="toggleDark()">Toggle</button><br><br>
Notifications <button>ON</button>
</div>
</div>

<!-- SUB -->
<div id="subscription" class="page">
<div class="back" onclick="goHome()">← Back</div>

<div class="card">
FREE PLAN<br><br>✔ Basic access
</div>

<div class="card">
PRO ₹199<br><br>✔ Premium jobs<br><br>
<button>Upgrade</button>
</div>
</div>

</div>

<!-- INPUT -->
<div class="input">
<input id="msg" placeholder="Type..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>

// NAVIGATION FIX
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById(id).classList.add("activePage");
closeSidebar();
}

function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById("chat").classList.add("activePage");
}

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function closeSidebar(){
document.getElementById("sidebar").classList.remove("active");
}

// ENTER FIX
function enterSend(e){
if(e.key==="Enter") send();
}

// CHAT
function send(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(!input.value) return;

let text=input.value.toLowerCase();

let u=document.createElement("div");
u.className="user";
u.innerText=input.value;
chat.appendChild(u);

let b=document.createElement("div");
b.className="bot";
b.innerText="Typing...";
chat.appendChild(b);

setTimeout(()=>{
if(
text.includes("who invented") ||
text.includes("kisne banaya") ||
text.includes("creator")
){
b.innerText="I was developed by Dharmesh Band, founder of DB Solutions Manpower Outsourcing & Placement Agency.";
}else{
b.innerText="Tell me your job preference (role, location, experience).";
}

chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
}

// VOICE
function voice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.onresult=e=>{
document.getElementById("msg").value=e.results[0][0].transcript;
};
rec.start();
}

// DARK MODE
function toggleDark(){
document.body.style.background =
document.body.style.background=="black"?"#0b1220":"black";
}
</script>

</body>
</html>
