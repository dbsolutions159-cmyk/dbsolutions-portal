<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

/* BODY */
body{
background:#020617;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
padding:10px;
display:flex;
flex-direction:column;
transition:0.3s;
}

.sidebar.hidden{
width:0;
padding:0;
overflow:hidden;
}

.logo{
font-weight:600;
padding:12px;
}

.new-chat{
background:#1e293b;
padding:10px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
}

.history{
flex:1;
overflow:auto;
}

.history div{
padding:10px;
border-radius:8px;
cursor:pointer;
color:#94a3b8;
}

.history div:hover{
background:#1e293b;
color:white;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:12px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu-btn{
cursor:pointer;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

/* MESSAGE */
.msg{
display:flex;
gap:10px;
max-width:800px;
}

.msg.user{
align-self:flex-end;
flex-direction:row-reverse;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
}

.bubble{
padding:12px 14px;
border-radius:16px;
background:#1e293b;
}

.user .bubble{
background:#2563eb;
}

/* INPUT */
.input-box{
padding:12px;
border-top:1px solid #1e293b;
}

.input-inner{
display:flex;
background:#1e293b;
border-radius:20px;
padding:6px;
}

input{
flex:1;
background:none;
border:none;
color:white;
padding:10px;
outline:none;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 14px;
border-radius:14px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:absolute;
z-index:100;
height:100%;
left:-260px;
}
.sidebar.active{
left:0;
}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">DB AI</div>

<div class="new-chat" onclick="newChat()">+ New Chat</div>

<div class="history" id="history"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="menu-btn" onclick="toggleSidebar()">☰</div>
<div>DB AI • GPT</div>
<div>⚡</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
<div class="input-inner">
<input id="msg" placeholder="Message DB AI..." onkeydown="enterSend(event)">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>

// STATE
let chats = JSON.parse(localStorage.getItem("chats")||"[]");
let currentChat = [];

// SIDEBAR
function toggleSidebar(){
sidebar.classList.toggle("active");
}

// HISTORY RENDER
function renderHistory(){
history.innerHTML="";
chats.forEach((c,i)=>{
let div=document.createElement("div");
div.innerText=c[0]?.text || "New Chat";
div.onclick=()=>loadChat(i);
history.appendChild(div);
});
}

// LOAD CHAT
function loadChat(i){
currentChat = chats[i];
chat.innerHTML="";
currentChat.forEach(m=>addMsg(m.text,m.user,false));
}

// NEW CHAT
function newChat(){
currentChat=[];
chat.innerHTML="";
}

// ADD MESSAGE
function addMsg(text,user,save=true){
chat.innerHTML += `
<div class="msg ${user?'user':''}">
<div class="avatar">${user?'U':'AI'}</div>
<div class="bubble">${text}</div>
</div>`;

chat.scrollTop = chat.scrollHeight;

if(save){
currentChat.push({text,user});
}
}

// SEND
function send(){
let text = msg.value.trim();
if(!text) return;

addMsg(text,true);
msg.value="";

let id="typing"+Date.now();

chat.innerHTML += `
<div class="msg" id="${id}">
<div class="avatar">AI</div>
<div class="bubble">Typing...</div>
</div>`;

fetch("https://db-backend-hiye.onrender.com/api/chat", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ message:text })
})
.then(res=>res.json())
.then(data=>{
document.getElementById(id).remove();
addMsg(data.reply,false);

saveChat();
})
.catch(()=>{
document.getElementById(id).remove();
addMsg("Server error ❌",false);
});
}

// SAVE CHAT
function saveChat(){
if(currentChat.length){
chats.push(currentChat);
localStorage.setItem("chats",JSON.stringify(chats));
renderHistory();
}
}

// ENTER
function enterSend(e){
if(e.key==="Enter") send();
}

// INIT
renderHistory();

</script>

</body>
</html>
