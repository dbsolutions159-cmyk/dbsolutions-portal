<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB GPT</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
}

.bubble{
padding:12px;
border-radius:12px;
margin:8px 0;
max-width:80%;
animation:fade 0.3s ease;
}

.user{
background:#22c55e;
align-self:flex-end;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.typing{
font-size:12px;
opacity:0.6;
margin:5px;
}

.input{
display:flex;
padding:10px;
background:#020617;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

button{
margin-left:10px;
padding:12px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
</div>

<script>

const API = "https://db-ai-backend.onrender.com/api"; // 🔥 CHANGE ONLY THIS IF NEEDED

function addMsg(text,type="ai"){
let div = document.createElement("div");
div.className="bubble "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
let t = document.createElement("div");
t.id="typing";
t.className="typing";
t.innerText="DB GPT is typing...";
chat.appendChild(t);
chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
let t = document.getElementById("typing");
if(t) t.remove();
}

async function send(){

let input = document.getElementById("msg");
let text = input.value.trim();
if(!text) return;

addMsg(text,"user");
input.value="";

showTyping();

try{

let res = await fetch(API+"/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId:"user1"
})
});

let data = await res.json();

removeTyping();

addMsg(data.reply || "No response","ai");

// Resume download
if(data.resume){
let btn = document.createElement("button");
btn.innerText="Download Resume";
btn.onclick = ()=>downloadResume(data.resume);
chat.appendChild(btn);
}

}catch(err){
removeTyping();
addMsg("Server error ❌","ai");
}

}

async function downloadResume(text){

let res = await fetch(API+"/download-resume",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({resume:text})
});

let blob = await res.blob();

let url = window.URL.createObjectURL(blob);
let a = document.createElement("a");
a.href = url;
a.download = "resume.pdf";
a.click();

}

</script>

</body>
</html>
