<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
body{
margin:0;
display:flex;
height:100vh;
font-family:sans-serif;
background:#0b1220;
color:white;
}

/* sidebar */
.sidebar{
width:250px;
background:#020617;
padding:20px;
}

/* main */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* chat */
.chat{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
max-width:800px;
margin:auto;
width:100%;
}

/* input */
.input{
display:flex;
padding:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
}

button{
padding:10px;
background:#22c55e;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="sidebar">
DB Job GPT ✔
</div>

<div class="main">

<div class="chat">
<div>Welcome</div>
</div>

<div class="input">
<input placeholder="Type...">
<button>Send</button>
</div>

</div>

</body>
</html>
