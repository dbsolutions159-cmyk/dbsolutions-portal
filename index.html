<script>

function enterSend(e){
if(e.key==="Enter") send();
}

function enterSend2(e){
if(e.key==="Enter") send2();
}

/* SEND FROM HOME */
function send(){
let text = msg.value.trim();
if(!text) return;

startChat();
addMsg(text,true);
bot(text);

msg.value="";
}

/* SEND FROM CHAT */
function send2(){
let text = msg2.value.trim();
if(!text) return;

addMsg(text,true);
bot(text);

msg2.value="";
}

/* START CHAT UI */
function startChat(){
home.style.display="none";
chat.style.display="block";
bottom.style.display="block";
}

/* ADD MESSAGE */
function addMsg(text,user){
chat.innerHTML += `
<div class="message ${user?'user':''}">
<div class="bubble">${text}</div>
</div>`;
chat.scrollTop = chat.scrollHeight;
}

/* BOT RESPONSE (API CONNECTED) */
function bot(text){

// typing indicator
let typingId = "typing-"+Date.now();
chat.innerHTML += `
<div class="message" id="${typingId}">
<div class="bubble typing">Typing...</div>
</div>`;

chat.scrollTop = chat.scrollHeight;

// 🔥 API CALL
fetch("http://localhost:3000/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ message: text })
})
.then(res => res.json())
.then(data => {

// remove typing
document.getElementById(typingId).remove();

// 🤖 AI reply
addMsg(data.reply,false);

// 💼 Show jobs
if(data.jobs && data.jobs.length > 0){

data.jobs.forEach(job => {

addMsg(`
💼 <b>${job.title}</b><br>
🏢 ${job.company || "Company"}<br>
📍 ${job.location || "Location"}<br>
${job.salary ? "💰 " + job.salary : ""}
<br><br>
<a href="${job.link || "#"}" target="_blank" style="color:#22c55e">Apply Now →</a>
`, false);

});

}

})
.catch(err=>{
document.getElementById(typingId).remove();
addMsg("Server error ❌", false);
});

}

</script>
