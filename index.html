<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,Segoe UI;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
.header{
padding:15px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
margin:10px 0;
max-width:75%;
padding:10px 14px;
border-radius:12px;
}

.user{
background:#22c55e;
margin-left:auto;
}

.bot{
background:#1e293b;
}

/* INPUT */
.bottom{
display:flex;
padding:10px;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>DB GPT 🚀</div>
<div>● Online</div>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
<input id="msg" placeholder="Ask jobs, salary, role...">
<button onclick="sendMsg()">Send</button>
</div>

<script>

const API = "https://db-ai-backend.onrender.com";

// UI add message
function addMsg(text, user){
  const chat = document.getElementById("chat");

  chat.innerHTML += `
  <div class="msg ${user ? 'user' : 'bot'}">
    ${text}
  </div>`;

  chat.scrollTop = chat.scrollHeight;
}

// MAIN CHAT
async function sendMsg(){
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if(!text) return;

  addMsg(text, true);
  input.value = "";

  try{

    const res = await fetch(`${API}/api/chat`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ message: text })
    });

    const data = await res.json();

    // JOBS SHOW
    let jobsHTML = "";

    if(data.jobs && data.jobs.length){
      jobsHTML += "<br><b>Jobs:</b><br>";

      data.jobs.forEach(j=>{
        jobsHTML += `
        🔹 ${j.title} - ${j.location || ""}
        <br>`;
      });
    }

    addMsg((data.reply || "No response") + jobsHTML, false);

  }catch(err){
    addMsg("Server error ❌", false);
  }
}

// ENTER KEY
document.getElementById("msg").addEventListener("keypress", function(e){
  if(e.key === "Enter") sendMsg();
});

</script>

</body>
</html>
