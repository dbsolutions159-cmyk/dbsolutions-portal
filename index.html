<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB GPT</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
}

.bubble{
background:#1e293b;
padding:12px;
border-radius:12px;
margin:10px 0;
max-width:80%;
}

.user{
background:#22c55e;
align-self:flex-end;
}

.input{
display:flex;
padding:10px;
background:#020617;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
}

button{
margin-left:10px;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

let text = msg.value;
if(!text) return;

addMsg(text,true);

msg.value="";

let res = await fetch("https://your-backend-url/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,userId:"user1"})
});

let data = await res.json();

addMsg(data.reply,false);

// resume UI
if(data.resume){
addMsg(data.resume,false,true);
}
}

function addMsg(text,user,isResume=false){

let div = document.createElement("div");
div.className="bubble"+(user?" user":"");

if(isResume){
div.innerHTML = `<pre>${text}</pre>
<button onclick='downloadResume(${JSON.stringify(text)})'>Download PDF</button>`;
}else{
div.innerText=text;
}

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

async function downloadResume(text){

await fetch("https://your-backend-url/api/download-resume",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({resume:text})
})
.then(res=>res.blob())
.then(blob=>{
let url=window.URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="resume.pdf";
a.click();
});

}

</script>

</body>
</html>
