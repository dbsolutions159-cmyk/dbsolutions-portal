<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

/* BACKGROUND */
body{
height:100vh;
display:grid;
grid-template-columns:260px 1fr;
background: radial-gradient(circle at top,#0f172a,#020617);
color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:20px;
border-right:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.logo{font-weight:600;margin-bottom:20px}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}
.menu div:hover{
background:#1e293b;
transform:translateX(5px);
}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.online{
color:#22c55e;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:0.4}
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:14px;
max-width:700px;
margin:auto;
}

/* MESSAGE */
.message{
display:flex;
gap:10px;
animation:fade 0.3s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.avatar{
width:30px;height:30px;border-radius:50%;
background:#334155;
display:flex;align-items:center;justify-content:center;
}

.user{flex-direction:row-reverse}

.bubble{
padding:12px;
border-radius:14px;
background:#1e293b;
}
.user .bubble{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* INPUT */
.input{
position:sticky;
bottom:10px;
display:flex;
gap:10px;
max-width:700px;
margin:auto;
padding:10px;
background:rgba(255,255,255,0.05);
border-radius:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
transition:0.2s;
}
button:active{transform:scale(0.95)}

/* JOB CARD */
.job{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:14px;
margin-top:8px;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}
.job:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(34,197,94,0.3);
}

.apply{
margin-top:10px;
display:inline-block;
padding:8px 12px;
background:#25D366;
border-radius:8px;
text-decoration:none;
color:white;
}

/* MOBILE */
@media(max-width:768px){
body{grid-template-columns:1fr}
.sidebar{
position:fixed;
left:-100%;
top:0;
height:100%;
width:240px;
}
.sidebar.active{left:0}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<div class="logo">DB Job GPT ✔</div>
<div class="menu">
<div>🏠 Home</div>
<div>👤 Profile</div>
<div>⚙️ Settings</div>
</div>
</div>

<div class="main">

<div class="header">
<div onclick="toggleMenu()">☰</div>
<div>DB Job GPT ✔</div>
<div class="online">● Online</div>
</div>

<div class="chat" id="chat">

<div class="message">
<div class="avatar">🤖</div>
<div class="bubble">Hi 👋 Ask me for jobs</div>
</div>

</div>

<div class="input">
<input id="msg" onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

</div>

<script>

// MENU
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

// ENTER
function enterSend(e){
if(e.key==="Enter") send();
}

// CHAT
function send(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(!input.value) return;

// user
chat.innerHTML+=`
<div class="message user">
<div class="avatar">👤</div>
<div class="bubble">${input.value}</div>
</div>
`;

// fake loading
chat.innerHTML+=`
<div class="message">
<div class="avatar">🤖</div>
<div class="bubble">...</div>
</div>
`;

setTimeout(()=>{

chat.lastElementChild.remove();

// job cards
chat.innerHTML+=`
<div class="message">
<div class="avatar">🤖</div>
<div class="bubble">
Here are best matches 👇

<div class="job">
<b>Customer Support</b><br>
Salary: ₹26k<br>
Match: 85%<br>
<a class="apply" href="#">Apply</a>
</div>

<div class="job">
<b>Backend Executive</b><br>
Salary: ₹30k<br>
Match: 78%<br>
<a class="apply" href="#">Apply</a>
</div>

</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

},1000);

input.value="";
}

// VOICE
function voice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.onresult=e=>{
document.getElementById("msg").value=e.results[0][0].transcript;
};
rec.start();
}

</script>

</body>
</html>
