<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI}

body{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
background:#0b1220;
color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
border-right:1px solid #1e293b;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:20px;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
}

.menu div:hover{
background:#1e293b;
}

.active{
background:#22c55e;
color:black;
}

.brand{
margin-top:auto;
font-size:12px;
color:#64748b;
}

/* MAIN */
.main{
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:15px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:12px;
max-width:900px;
margin:auto;
width:100%;
}

/* MESSAGES */
.bot{
background:#1e293b;
padding:14px;
border-radius:14px;
max-width:70%;
}

.user{
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:14px;
border-radius:14px;
align-self:flex-end;
max-width:70%;
}

/* INPUT */
.input{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #1e293b;
max-width:900px;
margin:auto;
width:100%;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
outline:none;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

body{
grid-template-columns:1fr;
}

.sidebar{
position:fixed;
left:-100%;
top:0;
height:100%;
width:240px;
z-index:1000;
transition:0.3s;
}

.sidebar.active{
left:0;
}

.menu-btn{
display:block;
cursor:pointer;
}

.chat{
padding:15px;
}

.input{
position:fixed;
bottom:0;
background:#020617;
}

}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">DB Job GPT ✔</div>

<div class="menu">
<div class="active">🏠 Home</div>
<div>👤 Profile</div>
<div>⚙️ Settings</div>
<div>💳 Subscription</div>
</div>

<div class="brand">
DB Job GPT by DB Solutions Manpower Outsourcing & Placement Agency
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div>DB Job GPT ✔</div>
<div>● AI Online</div>
</div>

<div class="chat" id="chat">
<div class="bot">👋 Welcome to DB Job GPT. How can I help you today?</div>
</div>

<div class="input">
<input id="msg" placeholder="Type your message..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

</div>

<script>

// MOBILE MENU
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

// ENTER KEY
function enterSend(e){
if(e.key==="Enter") send();
}

// CHAT
function send(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(!input.value) return;

let text=input.value.toLowerCase();

// USER
let u=document.createElement("div");
u.className="user";
u.innerText=input.value;
chat.appendChild(u);

// BOT
let b=document.createElement("div");
b.className="bot";
b.innerText="Typing...";
chat.appendChild(b);

setTimeout(()=>{

if(
text.includes("kisne banaya") ||
text.includes("who created") ||
text.includes("who invented") ||
text.includes("creator")
){
b.innerText="I was developed by Dharmesh Band, founder of DB Solutions Manpower Outsourcing & Placement Agency.";
}
else{
b.innerText="Tell me your job preference (role, location, experience).";
}

chat.scrollTop=chat.scrollHeight;

},500);

input.value="";
}

// VOICE
function voice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.onresult=e=>{
document.getElementById("msg").value=e.results[0][0].transcript;
};
rec.start();
}

</script>

</body>
</html>
