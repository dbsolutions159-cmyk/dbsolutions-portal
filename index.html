<!DOCTYPE html>
<html>
<head>
<title>DB Solutions AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,Segoe UI;
background:radial-gradient(circle at top,#111827,#020617);
color:white;
overflow-x:hidden;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
position:fixed;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
}

nav h2{color:#22c55e}

nav button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#22c55e,#4ade80);
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
}

.hero h1{
font-size:55px;
}

.hero span{color:#22c55e}

.hero p{
margin:20px 0;
color:#aaa;
max-width:600px;
}

.btn{
padding:15px 30px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#22c55e,#4ade80);
cursor:pointer;
}

/* GLOW EFFECT */
.glow{
position:absolute;
width:400px;
height:400px;
background:#22c55e;
filter:blur(120px);
top:20%;
right:10%;
opacity:0.3;
}

/* SECTION */
.section{
padding:80px;
text-align:center;
}

.cards{
display:flex;
gap:20px;
margin-top:30px;
}

.card{
flex:1;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

/* CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(45deg,#22c55e,#4ade80);
padding:18px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px #22c55e;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:90px;
right:20px;
width:350px;
height:500px;
background:#111827;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
}

/* CHAT HEADER */
.chat-header{
padding:15px;
background:#1f2937;
}

/* CHAT BODY */
.chat-body{
flex:1;
padding:10px;
overflow:auto;
}

/* MESSAGES */
.msg{
margin:5px;
padding:10px;
border-radius:10px;
animation:pop 0.3s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

.user{background:#22c55e;margin-left:auto}
.bot{background:#374151}

/* INPUT */
.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
}

.chat-input button{
background:#22c55e;
border:none;
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="glow"></div>

<nav>
<h2>DB Solutions</h2>
<div>
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>
</nav>

<section class="hero">
<h1>AI Powered <span>Hiring Platform</span></h1>
<p>Find jobs instantly with DB Mitra AI automation</p>
<button class="btn" onclick="start()">Start with AI</button>
</section>

<section class="section">
<h2>How AI Works</h2>

<div class="cards">
<div class="card">AI Talks with Candidates</div>
<div class="card">Collects Data</div>
<div class="card">Suggests Jobs</div>
</div>

</section>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chat-header">DB Mitra AI</div>
<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask for jobs...">
<button onclick="send()">➤</button>
</div>
</div>

<script>

/* BUTTONS */
function login(){
alert("Login working ✔");
}

function signup(){
alert("Signup working ✔");
}

function start(){
toggleChat();
}

/* CHAT */
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
box.style.flexDirection="column";
}

async function send(){
let text=msg.value;
if(!text)return;

add(text,"user");
msg.value="";

// typing
let typing=document.createElement("div");
typing.innerText="Typing...";
typing.className="msg bot";
chat.appendChild(typing);

try{

let res = await fetch("https://db-backend-hiye.onrender.com/api/chat", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

// अगर response सही नहीं है
if(!res.ok){
throw new Error("Server slow");
}

let data = await res.json();

chat.removeChild(typing);
add(data.reply || "No response","bot");

}catch(err){
console.log(err);

chat.removeChild(typing);
add("Server starting... try again in 5 sec ⏳","bot");
}


}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
}

</script>

</body>
</html>
