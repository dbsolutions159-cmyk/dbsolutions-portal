<!DOCTYPE html>
<html>
<head>
  <title>DB Solutions</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #00c6ff;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Sign Up</h2>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="mobile" placeholder="Mobile"><br>
  <button id="continueBtn">Continue</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_Ga-Mi9EPdi9gtJWkXA7fqgea1P40E54",
  authDomain: "dbsolutions-career.firebaseapp.com",
  databaseURL: "https://dbsolutions-career-default-rtdb.firebaseio.com",
  projectId: "dbsolutions-career",
  storageBucket: "dbsolutions-career.appspot.com",
  messagingSenderId: "672960239523",
  appId: "1:672960239523:web:9249f5b4e3d8eb6fe5ec16",
  measurementId: "G-XGD5ZM9MYC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// LOGIN
signInAnonymously(auth)
  .then(() => console.log("Login Success"))
  .catch((error) => alert(error.message));

// BUTTON CLICK
document.getElementById("continueBtn").addEventListener("click", () => {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile = document.getElementById("mobile").value;

  if (!name || !email || !mobile) {
    alert("Please fill all fields");
    return;
  }

  const userId = Date.now();

  set(ref(db, "users/" + userId), {
    name,
    email,
    mobile
  });

  localStorage.setItem("userName", name);

  alert("Login Successful 🚀");
  window.location.href = "dashboard.html";
});

</script>

</body>
</html>
