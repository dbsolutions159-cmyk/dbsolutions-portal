<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:100%;
max-width:420px;
height:95vh;
background:#020617;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:15px;
border-bottom:1px solid #1e293b;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.bot, .user{
padding:10px 14px;
border-radius:12px;
max-width:75%;
}

.bot{
background:#1e293b;
}

.user{
background:#22c55e;
align-self:flex-end;
}

.input{
display:flex;
padding:10px;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:10px 15px;
border:none;
background:#22c55e;
color:white;
border-radius:10px;
cursor:pointer;
}

.job{
background:#1e293b;
padding:10px;
border-radius:12px;
margin-top:5px;
}

.apply{
margin-top:8px;
display:inline-block;
background:#25D366;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
color:white;
font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">DB Job GPT</div>

<div class="chat" id="chat">
<div class="bot">👋 Welcome! Enter your job details (role, location, experience)</div>
</div>

<div class="input">
<input id="input" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
const jobs = [
 {role:"support", location:"bhopal", salary:"₹28k"},
 {role:"support", location:"indore", salary:"₹25k"},
 {role:"backend", location:"bhopal", salary:"₹22k"},
 {role:"chat", location:"bhopal", salary:"₹24k"}
];

function send(){
const input = document.getElementById("input");
const chat = document.getElementById("chat");

let text = input.value.toLowerCase();
if(!text) return;

// user msg
let user = document.createElement("div");
user.className="user";
user.innerText = input.value;
chat.appendChild(user);

input.value="";

// extract
let role = "";
let location = "";
let exp = "";

if(text.includes("support")) role="support";
if(text.includes("backend")) role="backend";
if(text.includes("chat")) role="chat";

if(text.includes("bhopal")) location="bhopal";
if(text.includes("indore")) location="indore";

if(text.includes("year")) exp="yes";

// match
let results = jobs.filter(j =>
 (!role || j.role===role) &&
 (!location || j.location===location)
);

// bot reply
setTimeout(()=>{
let bot = document.createElement("div");
bot.className="bot";

if(results.length){
bot.innerHTML="✅ Top Matches:<br><br>";

results.slice(0,2).forEach(j=>{
let match = 40;
if(role && j.role===role) match+=40;
if(location && j.location===location) match+=20;

let wa = `https://wa.me/919302186887?text=Hi I am applying for ${j.role} job in ${j.location}`;

bot.innerHTML += `
<div class="job">
<b>${j.role.toUpperCase()}</b><br>
📍 ${j.location}<br>
💰 ${j.salary}<br>
📊 Match: ${match}%<br>
<a class="apply" href="${wa}" target="_blank">Apply</a>
</div>
`;
});

}
else{
bot.innerText="❌ No jobs found. Try different role or location.";
}

chat.appendChild(bot);
chat.scrollTop = chat.scrollHeight;

},500);
}
</script>

</body>
</html>
