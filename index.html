<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Job GPT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#020617;
color:white;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
border-bottom:1px solid #1e293b;
}

.header span{
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#0f172a;
padding:20px;
transition:0.3s;
z-index:100;
}

.sidebar.active{
left:0;
}

.sidebar div{
padding:12px;
border-radius:8px;
cursor:pointer;
color:#94a3b8;
}

.sidebar div:hover{
background:#1e293b;
color:white;
}

/* HOME */
.home{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.title{font-size:26px;margin-bottom:10px}
.subtitle{color:#94a3b8;margin-bottom:20px}

/* SUGGESTIONS */
.suggestions{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.suggestions button{
background:#1e293b;
border:none;
padding:8px 12px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* INPUT */
.input-box{
width:100%;
max-width:600px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

/* CHAT */
.chat{
flex:1;
display:none;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:15px;
display:flex;
}

.user{justify-content:flex-end}

.bubble{
padding:12px 16px;
border-radius:16px;
max-width:75%;
background:#1e293b;
}

.user .bubble{
background:#22c55e;
}

/* JOB CARD */
.job{
background:#020617;
border:1px solid #1e293b;
padding:12px;
border-radius:12px;
margin-top:8px;
}

.job a{
display:inline-block;
margin-top:8px;
background:#22c55e;
padding:6px 10px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.title{font-size:22px}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div onclick="navigate('home')">🏠 Home</div>
<div onclick="navigate('chat')">💬 Chat</div>
<div onclick="navigate('profile')">👤 Profile</div>
<div onclick="navigate('settings')">⚙ Settings</div>
</div>

<!-- HEADER -->
<div class="header">
<span onclick="goBack()">←</span>
<span>DB Job GPT</span>
<span onclick="toggleMenu()">☰</span>
</div>

<!-- HOME -->
<div class="home" id="home">
<div class="title">Hi 👋 Dharmesh</div>
<div class="subtitle">Find jobs instantly</div>

<div class="suggestions">
<button onclick="sendQuick('job in bhopal')">Bhopal Jobs</button>
<button onclick="sendQuick('remote jobs')">Remote</button>
<button onclick="sendQuick('customer support')">Support</button>
</div>

<div class="input-box">
<input id="msg" placeholder="Search jobs..." onkeydown="enterSend(event)">
<button onclick="send()">Send</button>
</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<script>

// NAVIGATION
let currentPage = "home";
let historyStack = [];

function navigate(page){
document.getElementById("sidebar").classList.remove("active");
historyStack.push(currentPage);
currentPage = page;
renderPage();
}

function goBack(){
if(historyStack.length === 0) return;
currentPage = historyStack.pop();
renderPage();
}

function renderPage(){
home.style.display="none";
chat.style.display="none";

if(currentPage==="home") home.style.display="flex";
if(currentPage==="chat") chat.style.display="block";
}

// MENU
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

// INPUT
function enterSend(e){
if(e.key==="Enter") send();
}

function send(){
let text = msg.value.trim();
if(!text) return;

navigate("chat");
addMsg(text,true);
bot(text);

msg.value="";
}

function sendQuick(text){
navigate("chat");
addMsg(text,true);
bot(text);
}

// ADD MESSAGE
function addMsg(text,user){
chat.innerHTML += `
<div class="message ${user?'user':''}">
<div class="bubble">${text}</div>
</div>`;
chat.scrollTop = chat.scrollHeight;
}

// BOT
function bot(text){

let id="typing"+Date.now();

chat.innerHTML += `
<div class="message" id="${id}">
<div class="bubble">Typing...</div>
</div>`;

fetch("https://db-backend-hiye.onrender.com/api/chat", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ message:text })
})
.then(res=>res.json())
.then(data=>{

document.getElementById(id).remove();

addMsg(data.reply,false);

// JOB CARDS
if(data.jobs){
data.jobs.forEach(job=>{
chat.innerHTML += `
<div class="job">
<b>${job.title}</b><br>
${job.company || ""}<br>
${job.location || ""}<br>
<a href="${job.link || "#"}" target="_blank">Apply 🚀</a>
</div>`;
});
}

})
.catch(()=>{
document.getElementById(id).remove();
addMsg("Server error ❌",false);
});

}

</script>

</body>
</html>
