<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB AI Hiring</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f172a;color:white;display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:#020617;padding:20px}
.logo{font-size:20px;font-weight:bold;margin-bottom:20px}

/* CHAT */
.chat-container{flex:1;display:flex;flex-direction:column}
.header{
padding:15px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

/* AVATAR */
.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* VIDEO AVATAR */
#avatarVideo{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* CHAT */
.chat-box{flex:1;overflow-y:auto;padding:20px}

.message{
max-width:70%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
line-height:1.4;
}

.user{background:#2563eb;margin-left:auto}
.bot{background:#1e293b}

/* JOB CARD */
.job-card{
background:#111827;
padding:10px;
border-radius:10px;
margin-top:8px;
border:1px solid #374151;
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none}
.message{max-width:85%}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">DB AI</div>
</div>

<div class="chat-container">

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <video id="avatarVideo" autoplay loop muted>
      <source src="https://cdn.pixabay.com/vimeo/458093470/avatar.mp4" type="video/mp4">
    </video>
    <div>AI Hiring Assistant</div>
  </div>

  <select id="voiceSelect">
    <option value="male">Sriman ji</option>
    <option value="female">Shrimati ji</option>
  </select>
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask about jobs..." />
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

const API ="https://db-ai-backend.onrender.com/api/chat";

// 🔥 STREAMING TYPING
function typeEffect(element, text, speed=15){
let i = 0;
function typing(){
if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
setTimeout(typing, speed);
}
}
typing();
}

// 🔊 AI SPEAK + AVATAR
function speak(text){
const avatar = document.getElementById("avatarVideo");
avatar.style.border = "3px solid #22c55e";

const speech = new SpeechSynthesisUtterance(text);

const selected = document.getElementById("voiceSelect").value;
const voices = speechSynthesis.getVoices();

if(selected === "female"){
speech.voice = voices[1];
}else{
speech.voice = voices[0];
}

speech.lang = "en-IN";

speech.onend = () => {
avatar.style.border = "none";
};

speechSynthesis.speak(speech);
}

// 🚀 SEND MESSAGE
async function send(){
const input = document.getElementById("input");
const chat = document.getElementById("chat");

const msg = input.value;
if(!msg) return;

chat.innerHTML += `<div class="message user">${msg}</div>`;
input.value = "";

// bot container
const botDiv = document.createElement("div");
botDiv.className = "message bot";
chat.appendChild(botDiv);

// API call
const res = await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({message: msg})
});

const data = await res.json();

// job card logic
let reply = data.reply;

if(reply.toLowerCase().includes("job")){
reply += `
<div class="job-card">
<b>Customer Support Executive</b><br>
📍 Bhopal<br>
💰 ₹22,000
</div>`;
}

// streaming
typeEffect(botDiv, reply);

// speak
speak(reply);

chat.scrollTop = chat.scrollHeight;
}

// 🎤 VOICE INPUT
function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-IN";

recognition.onresult = function(event){
document.getElementById("input").value = event.results[0][0].transcript;
send();
}

recognition.start();
}

</script>

</body>
</html>
