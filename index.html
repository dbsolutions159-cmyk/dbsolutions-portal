<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB GPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,Segoe UI;
  background:#0f172a;
  color:white;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

#chatBox{
  background:#1e293b;
  padding:10px;
  height:300px;
  overflow:auto;
  margin-top:15px;
  border-radius:10px;
}

.msg{
  margin:5px 0;
}

.user{color:#38bdf8}
.bot{color:#22c55e}

</style>
</head>

<body>

<div class="container">

<h2>DB GPT 🚀</h2>

<!-- AUTH -->
<button onclick="registerUser()">Register</button>
<button onclick="loginUser()">Login</button>
<button onclick="getJobs()">Get Jobs</button>

<!-- CHAT -->
<div id="chatBox"></div>

<input type="text" id="msg" placeholder="Ask something...">
<button onclick="sendMsg()">Send</button>

</div>

<script>

const API = "https://db-ai-backend.onrender.com";

// Register
async function registerUser() {
  const res = await fetch(`${API}/api/auth/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: "Test User",
      email: "test@gmail.com",
      password: "123456"
    })
  });

  const data = await res.json();
  alert(JSON.stringify(data));
}

// Login
async function loginUser() {
  const res = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: "test@gmail.com",
      password: "123456"
    })
  });

  const data = await res.json();
  alert(JSON.stringify(data));
}

// Jobs
async function getJobs() {
  const res = await fetch(`${API}/api/jobs`);
  const data = await res.json();

  addMessage("bot", JSON.stringify(data));
}

// Chat
async function sendMsg() {
  const input = document.getElementById("msg");
  const message = input.value;

  if(!message) return;

  addMessage("user", message);
  input.value = "";

  const res = await fetch(`${API}/api/chat`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  addMessage("bot", data.reply || "No response");
}

// UI message add
function addMessage(type, text){
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerText = (type === "user" ? "You: " : "Bot: ") + text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
