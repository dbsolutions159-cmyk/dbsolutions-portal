<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions - Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f1f5f9;
}

.container {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f2027;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  color:#00c6ff;
}

.sidebar a {
  display:block;
  color:white;
  text-decoration:none;
  margin:12px 0;
}

.sidebar a:hover {
  background:#1e3a5f;
  padding-left:5px;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  max-width:600px;
}

/* FORM */
input, select, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  background:#00c6ff;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#0072ff;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>DB Solutions</h2>

    <a href="dashboard.html">🏠 Home</a>
    <a href="profile.html">👤 My Profile</a>
    <a href="applied.html">📄 Applied Jobs</a>
    <a href="saved.html">⭐ Saved Jobs</a>
    <a href="recommended.html">💼 Recommended</a>
    <a href="settings.html">⚙️ Settings</a>
    <a href="payment.html">💳 Payment</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <h1>Create / Update Profile</h1>

    <div class="card">

      <input id="name" placeholder="Full Name">
      <input id="email" placeholder="Email">
      <input id="phone" placeholder="Phone Number">

      <input id="education" placeholder="Education">
      <input id="experience" placeholder="Experience (years)">
      <input id="skills" placeholder="Skills (e.g. Excel, Communication)">

      <select id="jobType">
        <option value="">Preferred Job Type</option>
        <option>Work From Home</option>
        <option>Office</option>
      </select>

      <textarea id="address" placeholder="Full Address"></textarea>

      <input id="resume" placeholder="Resume Link (Google Drive link)">

      <button onclick="saveProfile()">Save Profile</button>

    </div>
  </div>

</div>

<script>

// SAVE PROFILE
function saveProfile(){
  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    education: document.getElementById("education").value,
    experience: document.getElementById("experience").value,
    skills: document.getElementById("skills").value,
    jobType: document.getElementById("jobType").value,
    address: document.getElementById("address").value,
    resume: document.getElementById("resume").value
  };

  localStorage.setItem("profileData", JSON.stringify(data));

  alert("✅ Profile Saved Successfully!");
}

// AUTO LOAD (Returning User)
let saved = JSON.parse(localStorage.getItem("profileData"));

if(saved){
  document.getElementById("name").value = saved.name || "";
  document.getElementById("email").value = saved.email || "";
  document.getElementById("phone").value = saved.phone || "";
  document.getElementById("education").value = saved.education || "";
  document.getElementById("experience").value = saved.experience || "";
  document.getElementById("skills").value = saved.skills || "";
  document.getElementById("jobType").value = saved.jobType || "";
  document.getElementById("address").value = saved.address || "";
  document.getElementById("resume").value = saved.resume || "";
}

</script>

</body>
</html>
