<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DB Solutions Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #0f2027;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      color: #00c6ff;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 12px 0;
      padding: 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1e3a5f;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 20px;
      background: #f1f5f9;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 15px;
      border: none;
      background: #00c6ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0072ff;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>DB Solutions</h2>

    <a href="dashboard.html">🏠 Home</a>
    <a href="profile.html">👤 My Profile</a>
    <a href="applied.html">📄 Applied Jobs</a>
    <a href="saved.html">⭐ Saved Jobs</a>
    <a href="recommended.html">💼 Recommended</a>
    <a href="settings.html">⚙️ Settings</a>
    <a href="payment.html">💳 Payment</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <h1>Dashboard</h1>

    <!-- PROFILE STATUS -->
    <div class="card">
      <h3>Profile Completion</h3>
      <p>60% Completed</p>
      <button onclick="window.location.href='profile.html'">Complete Profile</button>
    </div>

    <!-- JOBS -->
    <div class="card">
      <h3>Recommended Jobs</h3>
      <p><b>Amazon - Work From Home Support</b></p>
      <p>₹25,000 - ₹40,000</p>

      <button onclick="window.location.href='payment.html'">
        Apply Now
      </button>
    </div>

  </div>

</div>

</body>
</html>
