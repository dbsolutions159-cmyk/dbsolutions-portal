<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Pro Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#333;
}

/* ===== LAYOUT ===== */
.container{display:flex}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  height:100vh;
  padding:20px;
  color:white;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.sidebar h2{margin-bottom:20px}

.sidebar a{
  display:block;
  padding:12px;
  border-radius:8px;
  margin:8px 0;
  text-decoration:none;
  color:white;
  transition:.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}

/* ===== CONTENT ===== */
.content{
  flex:1;
  padding:25px;
}

/* ===== CARD ===== */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* ===== BUTTON ===== */
.btn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* ===== JOB CARD ===== */
.job{
  padding:12px;
  background:#f5f7fb;
  border-radius:10px;
  margin-top:10px;
}

/* ===== CHAT ===== */
.chat{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  padding:10px;
}

.chat-area{
  height:150px;
  overflow:auto;
  font-size:14px;
}

input{
  padding:8px;
  width:65%;
}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0072ff;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>DB Solutions</h2>
  <a href="#">🏠 Dashboard</a>
  <a href="profile.html">👤 Profile</a>
</div>

<!-- MAIN -->
<div class="content">

<h2 id="welcome">Welcome 👋</h2>

<div class="card">
  <h3>Profile Completion</h3>
  <p id="progress">0%</p>
  <button class="btn" onclick="goProfile()">Complete Profile</button>
</div>

<div class="card">
  <h3>🤖 AI Recommended Jobs</h3>
  <div id="jobs"></div>
</div>

<div class="card">
  <h3>💡 AI Suggestions</h3>
  <div id="tips"></div>
</div>

</div>
</div>

<!-- CHAT -->
<div class="chat">
  <b>🤖 DB Mitra</b>
  <div id="chatArea" class="chat-area"></div>
  <input id="msg" placeholder="Ask...">
  <button onclick="send()">Send</button>
</div>

<div id="toast" class="toast"></div>

<script>

/* ========= DATA ========= */

let user = safeParse(localStorage.getItem("profileData"));

let jobs = [
 {title:"Data Entry", skills:["excel"], salary:20000},
 {title:"Customer Support", skills:["communication"], salary:25000},
 {title:"WFH Chat Support", skills:["english"], salary:30000}
];

/* ========= HELPERS ========= */

function safeParse(data){
 try{return JSON.parse(data)}catch{return null}
}

function showToast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

/* ========= WELCOME ========= */

if(user?.name){
 welcome.innerText = "Welcome " + user.name + " 👋";
}

/* ========= PROFILE SCORE ========= */

let score = 0;

if(user){
 if(user.name) score+=20;
 if(user.skills) score+=30;
 if(user.experience) score+=20;
 if(user.jobType) score+=30;
}

progress.innerText = score + "%";

/* ========= JOB MATCH ========= */

let html="";

if(user?.skills){

 jobs.forEach(j=>{
   let match=0;

   j.skills.forEach(s=>{
     if(user.skills.toLowerCase().includes(s)) match+=50;
   });

   html+=`
   <div class="job">
     <b>${j.title}</b><br>
     Match: ${match}%<br>
     Salary: ₹${j.salary}<br><br>
     <button class="btn" onclick="apply()">Apply</button>
   </div>`;
 });

}else{
 html="Complete profile to unlock jobs";
}

jobsDiv = document.getElementById("jobs");
jobsDiv.innerHTML = html;

/* ========= AI TIPS ========= */

let tips="";

if(user){
 if(!user.skills) tips+="👉 Add skills<br>";
 if(user.experience==="Fresher") tips+="👉 Apply for fresher jobs<br>";
}else{
 tips="👉 Complete profile first";
}

document.getElementById("tips").innerHTML = tips;

/* ========= NAV ========= */

function goProfile(){
 window.location.href="profile.html";
}

/* ========= APPLY ========= */

function apply(){
 showToast("Application Started 🚀");
}

/* ========= CHAT ========= */

function send(){

 let m = msg.value.toLowerCase();
 let reply="";

 if(m.includes("job")){
   reply="Jobs are shown above based on your profile.";
 }
 else if(m.includes("salary")){
   reply="Salary depends on your skills & experience.";
 }
 else if(m.includes("profile")){
   reply="Complete your profile for better matches.";
 }
 else{
   reply="I am DB Mitra 🤖";
 }

 chatArea.innerHTML+=<p><b>You:</b> ${m}</p>;
 chatArea.innerHTML+=<p><b>AI:</b> ${reply}</p>;

 msg.value="";
}

</script>

</body>
</html>
