<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:'Segoe UI';background:#f1f5f9;}
.container {display:flex;}

.sidebar {
  width:230px;
  background:linear-gradient(180deg,#0f2027,#203a43);
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar a {
  display:block;
  color:white;
  margin:12px 0;
  text-decoration:none;
}

.content {flex:1;padding:25px;}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.job-card {
  background:#f8fafc;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>DB Solutions</h2>
  <a href="dashboard.html">Home</a>
  <a href="profile.html">Profile</a>
</div>

<div class="content">

<h2 id="welcomeText">Welcome 👋</h2>

<div class="card">
  <h3>Profile Completion</h3>
  <p id="progressText">0%</p>
  <button onclick="goProfile()">Complete Profile</button>
</div>

<div class="card">
  <h3>🤖 AI Recommended Jobs</h3>
  <div id="jobBox"></div>
</div>

</div>
</div>

<script>

// PROFILE LOAD
let user = JSON.parse(localStorage.getItem("profileData"));
let percent = localStorage.getItem("profilePercent");

if(user && user.name){
  welcomeText.innerText = "Welcome, " + user.name + " 👋";
}

progressText.innerText = percent ? percent+"%" : "0%";

// JOB DATABASE
let jobs = [
 {title:"Data Entry Executive", skills:["excel"], exp:"Fresher", salary:20000},
 {title:"Customer Support", skills:["communication"], exp:"Fresher", salary:25000},
 {title:"WFH Chat Support", skills:["communication"], exp:"Fresher", salary:30000}
];

// AI MATCHING
let html = "";

if(user){

 let results = [];

 jobs.forEach(job=>{
   let score = 0;

   job.skills.forEach(s=>{
     if(user.skills.toLowerCase().includes(s)) score+=50;
   });

   if(user.experience===job.exp) score+=30;

   if(user.jobType==="Work From Home" && job.title.includes("WFH")) score+=20;

   results.push({...job,score});
 });

 results.sort((a,b)=>b.score-a.score);

 results.slice(0,3).forEach(job=>{
   html+=`
   <div class="job-card">
   <b>${job.title}</b><br>
   Match: ${job.score}%<br>
   Salary: ₹${job.salary}<br><br>
   <button onclick="goApply()">Apply</button>
   </div>`;
 });

}else{
 html=<button onclick="goProfile()">Create Profile</button>;
}

jobBox.innerHTML=html;

// FUNCTIONS
function goProfile(){window.location.href="profile.html";}
function goApply(){window.location.href="payment.html";}

</script>

<!-- 🤖 DB MITRA CHATBOT -->

<div id="chatbot" style="
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
overflow:hidden;
">

<div style="background:#0072ff;color:white;padding:10px;">
🤖 DB Mitra
</div>

<div id="chatArea" style="height:250px;overflow:auto;padding:10px;font-size:14px;"></div>

<div style="display:flex;">
<input id="userMsg" placeholder="Ask DB Mitra..." style="flex:1;padding:10px;border:none;">
<button onclick="sendMsg()" style="background:#0072ff;color:white;border:none;padding:10px;">Send</button>
</div>

</div>

<script>

async function sendMsg(){

let msg = userMsg.value;
chatArea.innerHTML += "<p><b>You:</b> "+msg+"</p>";

let profile = JSON.parse(localStorage.getItem("profileData"));

let context = `
You are DB Mitra, AI job consultant.
User:
Name:${profile?.name||""}
Skills:${profile?.skills||""}
Experience:${profile?.experience||""}
`;

let res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_GROQ_API_KEY"
},
body:JSON.stringify({
model:"llama3-8b-8192",
messages:[
{role:"system",content:context},
{role:"user",content:msg}
]
})
});

let data = await res.json();

let reply=data.choices[0].message.content;

chatArea.innerHTML += "<p><b>DB Mitra:</b> "+reply+"</p>";

userMsg.value="";
}

</script>

</body>
</html>
