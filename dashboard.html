<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#333;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  color:white;
  padding:25px;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  border-radius:8px;
  margin:8px 0;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* JOB CARD */
.job-card{
  background:#f8fafc;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  transition:0.3s;
}

.job-card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* CHATBOX */
.chatbox{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  padding:10px;
}

.chat-header{
  font-weight:bold;
  margin-bottom:5px;
}

.chat-area{
  height:150px;
  overflow:auto;
  font-size:14px;
}

input{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  width:65%;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>DB Solutions</h2>
  <a href="#">🏠 Home</a>
  <a href="profile.html">👤 Profile</a>
  <a href="#">💼 Jobs</a>
  <a href="#">⚙ Settings</a>
</div>

<!-- MAIN -->
<div class="content">

<h2 id="welcomeText">Welcome 👋</h2>

<div class="card">
  <h3>Profile Completion</h3>
  <p id="progressText">0%</p>
  <button onclick="goProfile()">Complete Profile</button>
</div>

<div class="card">
  <h3>🤖 AI Recommended Jobs</h3>
  <div id="jobBox"></div>
</div>

<div class="card">
  <h3>💡 AI Suggestions</h3>
  <div id="aiTips"></div>
</div>

</div>
</div>

<!-- CHAT -->
<div class="chatbox">

<div class="chat-header">🤖 DB Mitra</div>

<div id="chatArea" class="chat-area"></div>

<input id="userMsg" placeholder="Ask...">
<button onclick="sendMsg()">Send</button>

</div>

<script>

// PROFILE LOAD
let user = JSON.parse(localStorage.getItem("profileData"));
let percent = localStorage.getItem("profilePercent");

// WELCOME
if(user && user.name){
  welcomeText.innerText = "Welcome, " + user.name + " 👋";
}

// PROGRESS
progressText.innerText = percent ? percent + "%" : "0%";

// JOB DATA
let jobs = [
 {title:"Data Entry", skills:["excel"], salary:20000},
 {title:"Customer Support", skills:["communication"], salary:25000},
 {title:"WFH Chat Support", skills:["english"], salary:30000}
];

let html="";

if(user){

 jobs.forEach(job=>{
   let match = 0;

   job.skills.forEach(skill=>{
     if(user.skills?.toLowerCase().includes(skill)){
       match += 50;
     }
   });

   html += `
   <div class="job-card">
     <b>${job.title}</b><br>
     Match: ${match}%<br>
     Salary: ₹${job.salary}<br><br>
     <button>Apply Now</button>
   </div>`;
 });

}else{
 html = "Complete profile to see jobs";
}

jobBox.innerHTML = html;

// AI TIPS
let tips="";
if(user){
 if(!user.skills) tips+="👉 Add skills<br>";
 if(user.experience==="Fresher") tips+="👉 Apply for fresher jobs<br>";
}else{
 tips="👉 Complete profile first";
}
aiTips.innerHTML = tips;

// CHAT
function sendMsg(){
 let msg=userMsg.value.toLowerCase();

 let reply="";

 if(msg.includes("job")){
   reply="Check recommended jobs above.";
 }
 else if(msg.includes("salary")){
   reply="Salary depends on your profile.";
 }
 else{
   reply="I am DB Mitra 🤖";
 }

 chatArea.innerHTML+=<p><b>You:</b> ${msg}</p>;
 chatArea.innerHTML+=<p><b>AI:</b> ${reply}</p>;

 userMsg.value="";
}

// NAV
function goProfile(){
 window.location.href="profile.html";
}

</script>

</body>
</html>
