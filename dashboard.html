<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:'Segoe UI';background:#f1f5f9;}
.container {display:flex;}

.sidebar {
  width:230px;
  background:#0f2027;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar a {
  display:block;
  color:white;
  margin:12px 0;
  text-decoration:none;
}

.content {flex:1;padding:25px;}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.job-card {
  background:#f8fafc;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>DB Solutions</h2>
  <a href="dashboard.html">Home</a>
  <a href="profile.html">Profile</a>
</div>

<div class="content">

<h2 id="welcomeText">Welcome 👋</h2>

<div class="card">
  <h3>Profile Completion</h3>
  <p id="progressText">0%</p>
  <button onclick="goProfile()">Complete Profile</button>
</div>

<div class="card">
  <h3>🤖 AI Recommended Jobs</h3>
  <div id="jobBox"></div>
</div>

</div>
</div>

<script>

// LOAD PROFILE
let user = JSON.parse(localStorage.getItem("profileData"));
let percent = localStorage.getItem("profilePercent");

// WELCOME
if(user && user.name){
  document.getElementById("welcomeText").innerText = "Welcome, " + user.name + " 👋";
}

// PROGRESS
document.getElementById("progressText").innerText = percent ? percent + "%" : "0%";

// JOB DATABASE
let jobs = [
 {title:"Data Entry Executive", skills:["excel","typing"], exp:"Fresher", type:"Work From Home", salary:20000},
 {title:"Customer Support", skills:["communication"], exp:"Fresher", type:"Office", salary:25000},
 {title:"WFH Chat Support", skills:["communication","english"], exp:"Fresher", type:"Work From Home", salary:30000}
];

// AI MATCHING
let html = "";

if(user){

 let results = [];

 jobs.forEach(job=>{
   let score = 0;

   job.skills.forEach(skill=>{
     if(user.skills && user.skills.toLowerCase().includes(skill)){
       score += 50;
     }
   });

   if(user.experience === job.exp) score += 30;

   if(user.jobType === job.type) score += 20;

   results.push({...job, score});
 });

 results.sort((a,b)=>b.score-a.score);

 results.slice(0,3).forEach(job=>{
   html += `
   <div class="job-card">
     <b>${job.title}</b><br>
     Match: ${job.score}%<br>
     Salary: ₹${job.salary}<br><br>
     <button onclick="goApply()">Apply Now</button>
   </div>`;
 });

}else{
 html = <p>Please complete your profile to see jobs.</p>;
}

document.getElementById("jobBox").innerHTML = html;

// NAVIGATION
function goProfile(){
  window.location.href="profile.html";
}

function goApply(){
  window.location.href="payment.html";
}

</script>

<!-- 🤖 SIMPLE DB MITRA CHATBOT -->

<div style="
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
padding:10px;
">

<h4>🤖 DB Mitra</h4>

<div id="chatArea" style="height:150px;overflow:auto;font-size:14px;"></div>

<input id="userMsg" placeholder="Ask..." style="width:70%;">
<button onclick="sendMsg()">Send</button>

</div>

<script>

function sendMsg(){

let msg = document.getElementById("userMsg").value.toLowerCase();
let chat = document.getElementById("chatArea");

let reply = "";

// SIMPLE AI (NO API)

if(msg.includes("job")){
  reply = "Based on your profile, you can apply for recommended jobs above.";
}
else if(msg.includes("salary")){
  reply = "Salary range is ₹15k to ₹40k depending on job.";
}
else if(msg.includes("help")){
  reply = "I can help you with jobs and profile guidance.";
}
else{
  reply = "Hello! I am DB Mitra. Ask me about jobs.";
}

chat.innerHTML += "<p><b>You:</b> " + msg + "</p>";
chat.innerHTML += "<p><b>DB Mitra:</b> " + reply + "</p>";

document.getElementById("userMsg").value="";
}

</script>

</body>
</html>
