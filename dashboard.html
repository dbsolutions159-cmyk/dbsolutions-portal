<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:#00c6ff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e1e1e;
  padding:30px;
  border-radius:15px;
  display:none;
  width:300px;
}

.popup input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Welcome to DB Solutions</h1>
  <p>Start Your Career Journey</p>
  <button onclick="openPopup()">Get Hired</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>Sign Up</h2>
  <input id="name" type="text" placeholder="Name">
  <input id="email" type="email" placeholder="Email">
  <input id="mobile" type="number" placeholder="Mobile">
  <button id="continueBtn">Continue</button>
</div>

<script>
function openPopup(){
  document.getElementById("popup").style.display="block";
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_Ga-Mi9EPdi9gtJWkXA7fqgea1P4OE54",
  authDomain: "dbsolutions-career.firebaseapp.com",
  databaseURL: "https://dbsolutions-career-default-rtdb.firebaseio.com",
  projectId: "dbsolutions-career"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

document.getElementById("continueBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile = document.getElementById("mobile").value;

  if(!name || !email || !mobile){
    alert("Please fill all details");
    return;
  }

  try{
    const userCredential = await signInAnonymously(auth);
    const user = userCredential.user;

    await set(ref(db, 'users/' + user.uid), {
      name: name,
      email: email,
      mobile: mobile
    });

    alert("Login Successful ✅");

    window.location.href = "dashboard.html";

  }catch(error){
    console.error(error);
    alert("Error: " + error.message);
  }

});

</script>

</body>
</html>
