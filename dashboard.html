[10:32 pm, 27/3/2026] Dharmesh Band: <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f5f9;
}

.container { display:flex; }

/* SIDEBAR */
.sidebar {
  width:230px;
  background: linear-gradient(180deg,#0f2027,#203a43);
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2 { color:#00c6ff; }

.sidebar a {
  display:block;
  color:white;
  text-decoration:none;
  margin:12px 0;
}

/* CONTENT */
.content {
  flex:1;
  padding:25px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* JOB CARD */
.job-card {
  display:flex;
  gap:15px;
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  background:#f8fafc;
}

.job-card img {
  width:120px;
  height:90px;
  border-radius:10px;
  object-fit:cover;
}

/* BUTTON */
button {
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>DB Solutions</h2>

  <a href="dashboard.html">🏠 Home</a>
  <a href="profile.html">👤 My Profile</a>
  <a href="applied.html">📄 Applied Jobs</a>
  <a href="saved.html">⭐ Saved Jobs</a>
  <a href="recommended.html">💼 Recommended</a>
  <a href="settings.html">⚙️ Settings</a>
  <a href="payment.html">💳 Payment</a>
</div>

<!-- CONTENT -->
<div class="content">

<h2 id="welcomeText">Welcome 👋</h2>

<!-- PROFILE -->
<div class="card">
  <h3>Profile Completion</h3>
  <p id="progressText">0% Completed</p>
  <button onclick="goProfile()">Complete Profile</button>
</div>

<!-- AI JOBS -->
<div class="card">
  <h3>🤖 AI Recommended Jobs</h3>
  <div id="jobBox"></div>
</div>

</div>
</div>

<script>

//////////////////////////
// LOAD PROFILE
//////////////////////////

let data = JSON.parse(localStorage.getItem("profileData"));
let percent = localStorage.getItem("profilePercent");

// Welcome Name
if(data && data.name){
  document.getElementById("welcomeText").innerText = "Welcome, " + data.name + " 👋";
}

// Profile %
if(percent){
  document.getElementById("progressText").innerText = percent + "% Completed";
}else{
  document.getElementById("progressText").innerText = "0% Completed";
}

//////////////////////////
// AI JOBS
//////////////////////////

let jobHTML = "";

if(data){

  let skills = (data.skills || "").toLowerCase();
  let jobType = data.jobType || "";
  let exp = data.experience || "";

  if(percent < 100){
    jobHTML = `
      <p>⚠️ Complete your profile to unlock jobs</p>
      <button onclick="goProfile()">Complete Profile</button>
    `;
  }else{

    if(skills.includes("excel") || skills.includes("data")){
      jobHTML += `
        <div class="job-card">
          <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f">
          <div>
            <b>Data Entry / MIS Executive</b><br>
            ₹18k - ₹30k<br><br>
            <button onclick="goApply()">Apply</button>
          </div>
        </div>
      `;
    }

    if(skills.includes("communication")){
      jobHTML += `
        <div class="job-card">
          <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216">
          <div>
            <b>Customer Support Executive</b><br>
            ₹20k - ₹35k<br><br>
            <button onclick="goApply()">Apply</button>
          </div>
        </div>
      `;
    }

    if(jobType === "Work From Home"){
      jobHTML += `
        <div class="job-card">
          <img src="https://images.unsplash.com/photo-1581090700227-4c4f50c9f1c3">
          <div>
            <b>WFH Chat Support</b><br>
            ₹22k - ₹40k<br><br>
            <button onclick="goApply()">Apply</button>
          </div>
        </div>
      `;
    }

    if(jobHTML === ""){
      jobHTML = <p>No strong match found. Update your profile.</p>;
    }

  }

}else{
  jobHTML = `
    <p>⚠️ No profile found</p>
    <button onclick="goProfile()">Create Profile</button>
  `;
}

document.getElementById("jobBox").innerHTML = jobHTML;

//////////////////////////
// FUNCTIONS
//////////////////////////

function goProfile(){
  window.location.href = "profile.html";
}

function goApply(){
  window.location.href = "payment.html";
}

</script>

</body>
</html>
